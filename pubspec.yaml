name: market_mind
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.10.4

flutter:
  assets:
    - assets/icon/
    - assets/video/
    - assets/video/template_video/
    - assets/onboarding/
    - assets/auth/
  uses-material-design: true
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
          weight: 400
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
    - family: Luckiest Guy
      fonts:
        - asset: assets/fonts/LuckiestGuy-Regular.ttf

dev_dependencies:
  flutter_launcher_icons: ^0.13.1
  flutter_lints: ^5.0.0
  build_runner: ^2.4.0
  hive_generator: ^2.0.0

flutter_icons:
  android: true
  ios: true

  # Default icon (light theme)
  image_path: "assets/icon/icon_light.png"

  # Android Adaptive Icon
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icon/icon_light.png"

  # Android 13+ Monochrome (auto dark/light by OS)
  adaptive_icon_monochrome: "assets/icon/monochrome_icon.png"

  # iOS
  image_path_ios: "assets/icon/icon_light.png"
  remove_alpha_ios: true
dependencies:
  flutter:
    sdk: flutter
  animated_text_kit: ^4.3.0
  shimmer: ^3.0.0
  flutter_svg: ^2.2.0
  loading_animation_widget: ^1.3.0
  google_fonts: ^6.3.2
  video_player: ^2.9.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  image_picker: ^1.1.2
  path_provider: ^2.1.2
  uuid: ^4.0.0
  path: ^1.9.0
  permission_handler: ^11.4.0
  google_sign_in: ^7.2.0
  dio: ^5.9.2
  flutter_secure_storage: ^10.0.0
  logger: ^2.6.2
  cloudinary_public: ^0.23.1

